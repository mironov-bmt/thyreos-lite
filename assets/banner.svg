<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="100%" stop-color="#141920"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(79,195,247,0.2)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0.05)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="8"/>

  <!-- Grid pattern -->
  <g stroke="rgba(79,195,247,0.06)" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(400, 70)" filter="url(#glow)">
    <path d="M0 -35 L-28 -20 v25 c0 20 12 34 28 40 c16 -6 28 -20 28 -40 v-25 Z" 
          fill="url(#shieldGrad)" stroke="#4FC3F7" stroke-width="2"/>
    <path d="M0 -22 L-20 -10 v18 c0 14 9 24 20 28 c11 -4 20 -14 20 -28 v-18 Z" 
          stroke="rgba(79,195,247,0.5)" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="5" r="4" fill="#4FC3F7"/>
  </g>

  <!-- Title -->
  <text x="400" y="140" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" 
        font-size="28" font-weight="700" fill="#ffffff" letter-spacing="4">THYREOS</text>
  <text x="400" y="140" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" 
        font-size="28" font-weight="700" fill="#4FC3F7" letter-spacing="4" dx="82">-LITE</text>

  <!-- Subtitle / Crypto specs -->
  <text x="400" y="168" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" 
        font-size="11" fill="#4a5568" letter-spacing="3">PBKDF2  +  AES-256-GCM</text>

  <!-- Decorative corner accents -->
  <path d="M20 20 L35 20 L35 25 L25 25 L25 35 L20 35 Z" fill="#4FC3F7" opacity="0.3"/>
  <path d="M780 20 L765 20 L765 25 L775 25 L775 35 L780 35 Z" fill="#4FC3F7" opacity="0.3"/>
  <path d="M20 180 L35 180 L35 175 L25 175 L25 165 L20 165 Z" fill="#4FC3F7" opacity="0.3"/>
  <path d="M780 180 L765 180 L765 175 L775 175 L775 165 L780 165 Z" fill="#4FC3F7" opacity="0.3"/>

  <!-- Side decorative lines -->
  <line x1="60" y1="100" x2="120" y2="100" stroke="#4FC3F7" stroke-width="1" opacity="0.2"/>
  <line x1="680" y1="100" x2="740" y2="100" stroke="#4FC3F7" stroke-width="1" opacity="0.2"/>
</svg>